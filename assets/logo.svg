<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="40" fill="#1e293b" />
  <g stroke="#f8fafc" stroke-width="13" stroke-linecap="round" fill="none">
    <!-- multitool blades fanning down from the pivot -->
    <line x1="128" y1="124" x2="70" y2="184" />
    <line x1="128" y1="124" x2="99" y2="200" />
    <line x1="128" y1="124" x2="128" y2="206" />
    <line x1="128" y1="124" x2="157" y2="200" />
    <line x1="128" y1="124" x2="186" y2="184" />
    <!-- main tool: the "T" rising from the pivot -->
    <line x1="128" y1="124" x2="128" y2="60" />
    <line x1="100" y1="60" x2="156" y2="60" />
  </g>
  <!-- pivot -->
  <circle cx="128" cy="124" r="13" fill="#f8fafc" />
  <!-- orange accent -->
  <circle cx="163" cy="55" r="12" fill="#ea580c" />
</svg>
